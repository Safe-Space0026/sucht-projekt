name: Fetch GitHub Traffic
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and accumulate traffic
        run: |
          mkdir -p data
          curl -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/Safe-Space0026/sucht-projekt/traffic/views \
               -o data/traffic.json
          curl -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/Safe-Space0026/sucht-projekt/traffic/popular/paths \
               -o data/traffic_pages.json
          if [ -f data/traffic_total.json ]; then
            OLD=$(cat data/traffic_total.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('total',0))")
          else
            OLD=0
          fi
          NEW=$(cat data/traffic.json | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('count',0))")
          if [ "$NEW" -gt "$OLD" ]; then
            echo "{\"total\": $NEW, \"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/traffic_total.json
          fi
      - name: Count selbsttest issues
        run: |
          COUNT=$(curl -s -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/Safe-Space0026/sucht-projekt/issues?labels=selbsttest&state=all&per_page=100" \
            | python3 -c "import sys,json;print(len(json.load(sys.stdin)))")
          echo "{\"total\": $COUNT, \"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/stats.json
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/traffic.json data/traffic_pages.json data/traffic_total.json data/stats.json
          git diff --staged --quiet || git commit -m "chore: update traffic and test data"
          git push
