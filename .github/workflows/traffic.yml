name: Fetch GitHub Traffic

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  fetch-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch traffic views
        run: |
          mkdir -p data
          curl -s \
            -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/safe-space0026/sucht-projekt/traffic/views \
            > data/traffic.json

      - name: Fetch popular paths
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/safe-space0026/sucht-projekt/traffic/popular/paths \
            > data/traffic_pages.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic.json data/traffic_pages.json
          git diff --staged --quiet || git commit -m "chore: update traffic data [skip ci]"
          git push
