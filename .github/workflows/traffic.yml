name: Fetch GitHub Traffic
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch traffic views
        run: |
          mkdir -p data
          curl -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/Safe-Space0026/sucht-projekt/traffic/views \
               -o data/traffic.json
          curl -H "Authorization: Bearer ${{ secrets.TRAFFIC_TOKEN }}" \
               -H "Accept: application/vnd.github+json" \
               https://api.github.com/repos/Safe-Space0026/sucht-projekt/traffic/popular/paths \
               -o data/traffic_pages.json
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/traffic.json data/traffic_pages.json
          git diff --staged --quiet || git commit -m "chore: update traffic data"
          git push
